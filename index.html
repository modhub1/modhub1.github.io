<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ModHub Download</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f0f0f;
            --panel: #171717;
            --panel-2: #202020;
            --line: #2e2e2e;
            --line-strong: #3a3a3a;
            --text: #f4f4f4;
            --muted: #a7a7a7;
            --soft: #d8d8d8;
            --accent: #00c8ff;
            --accent-strong: #00a8d6;
            --source: #8b5cf6;
            --source-hover: #a78bfa;
            --good: #70e092;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        body {
            font-size: 15px;
            letter-spacing: 0;
        }

        a {
            color: inherit;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 1px solid var(--line);
            background: rgb(15 15 15 / 92%);
            backdrop-filter: blur(14px);
        }

        .header-inner {
            width: min(1080px, calc(100% - 40px));
            min-height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin: 0 auto;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .brand img {
            display: block;
            width: 184px;
            max-width: 48vw;
            height: auto;
        }

        .header-download {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--soft);
            padding: 0 14px;
            text-decoration: none;
            font-weight: 700;
        }

        .header-download:hover {
            border-color: var(--line-strong);
            background: var(--panel-2);
            color: var(--text);
        }

        main {
            width: min(1080px, calc(100% - 40px));
            display: grid;
            gap: 26px;
            margin: 0 auto;
            padding: 64px 0 42px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 24px;
            align-items: end;
            min-height: 360px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 44px;
        }

        .hero-copy {
            display: grid;
            gap: 22px;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            max-width: 760px;
            font-size: clamp(48px, 8vw, 92px);
            line-height: 0.96;
            letter-spacing: 0;
        }

        .lead {
            max-width: 650px;
            color: var(--muted);
            font-size: clamp(17px, 2vw, 21px);
            line-height: 1.55;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .download,
        .source {
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #ffffff;
            padding: 0 20px;
            font-weight: 850;
            text-decoration: none;
        }

        .download {
            border: 1px solid #007da1;
            background: var(--accent-strong);
        }

        .download:hover {
            background: var(--accent);
        }

        .source {
            border: 1px solid #6d28d9;
            background: var(--source);
        }

        .source:hover {
            background: var(--source-hover);
        }

        .file-meta {
            color: var(--muted);
            font-size: 14px;
        }

        footer {
            color: #777;
            font-size: 13px;
            text-align: center;
            padding-top: 2px;
        }

        @media (max-width: 680px) {
            .header-inner,
            main {
                width: min(100% - 28px, 1080px);
            }

            .brand img {
                width: 148px;
            }

            .header-download {
                display: none;
            }

            main {
                padding-top: 42px;
            }

            h1 {
                font-size: clamp(42px, 16vw, 64px);
            }

            .download,
            .source {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="./" aria-label="ModHub">
                <img src="Logo%20(text).png" alt="ModHub">
            </a>
            <a class="header-download" href="https://www.dropbox.com/scl/fi/0cil594n0z6cqd34qch41/ModHub.exe?rlkey=f6lilad1tp083azhyb5o3qnfi&st=8jidgizn&dl=1" download>Download</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-copy">
                <h1>Download ModHub for Windows</h1>
                <p class="lead">Browse, install, manage, and launch Gorilla Tag mods from one clean desktop app. The download is bellow :)</p>
                <div class="actions">
                    <a class="download" href="https://www.dropbox.com/scl/fi/0cil594n0z6cqd34qch41/ModHub.exe?rlkey=f6lilad1tp083azhyb5o3qnfi&st=8jidgizn&dl=1" download>Download ModHub</a>
                    <a class="source" href="https://google.com/hello">Source Code</a>
                    <span class="file-meta">Windows x64 build</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
